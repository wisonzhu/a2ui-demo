<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2UI Studio - Standard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e14;--surface:#12171f;--border:#1e2733;--text:#b8c5d6;--primary:#3b82f6}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:400px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.sidebar-header b{color:#e2e8f0;font-size:1.1rem}
.sidebar-body{flex:1;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.75rem;overflow-y:auto}
.sidebar-body label{font-size:.8rem;color:#5c6a7d;font-weight:500;text-transform:uppercase}
.sidebar-body textarea{width:100%;min-height:100px;background:#0f141c;border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.75rem;font-size:.9rem;resize:vertical;font-family:inherit}
.sidebar-body textarea:focus{outline:none;border-color:var(--primary)}
.chips{display:flex;flex-wrap:wrap;gap:.35rem}
.chip{background:#161c26;color:#5c6a7d;border:1px solid var(--border);border-radius:20px;padding:.3rem .7rem;font-size:.75rem;cursor:pointer;transition:all .15s}
.chip:hover{color:#b8c5d6;border-color:var(--primary)}
button{cursor:pointer;font-family:inherit}
.btn{padding:.55rem 1.25rem;border-radius:10px;font-size:.9rem;border:none;font-weight:500;transition:background .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#2563eb}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.main-header h2{font-size:1rem;color:#e2e8f0}
.main-body{flex:1;padding:1.5rem;overflow-y:auto}
.status{font-size:.8rem;color:#5c6a7d}
.config-section{border-top:1px solid var(--border);padding:1rem 1.5rem}
.config-section details summary{font-size:.8rem;color:#5c6a7d;cursor:pointer}
.config-section input{width:100%;padding:.4rem .6rem;background:#0f141c;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.8rem;margin:.3rem 0;font-family:inherit}
pre{font-size:.7rem;max-height:200px;overflow:auto;background:#0a0e14;border-radius:6px;padding:.75rem}
a2ui-surface{display:block;min-height:100px}
</style></head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><b>⚡ A2UI Studio</b> <span style="font-size:.75rem;color:#22c55e">v0.9 Standard</span></div>
  <div class="sidebar-body">
    <label>Describe your UI</label>
    <textarea id="prompt" placeholder="一个用户注册表单，包含姓名、邮箱、手机号"></textarea>
    <div class="chips">
      <button class="chip" onclick="document.getElementById('prompt').value='一个用户注册表单，包含姓名、邮箱、手机号'">📝 注册表单</button>
      <button class="chip" onclick="document.getElementById('prompt').value='一个数据表格，姓名、年龄、城市'">📊 表格</button>
      <button class="chip" onclick="document.getElementById('prompt').value='一个柱状图显示各季度销售额'">📈 柱状图</button>
      <button class="chip" onclick="document.getElementById('prompt').value='admin dashboard with user table, stats cards, and charts'">🖥 Admin</button>
    </div>
    <button class="btn btn-primary" onclick="generate()">Generate UI</button>
    <details><summary>Generated JSON</summary><pre id="jsonView">Click Generate</pre></details>
  </div>
  <div class="config-section">
    <details open><summary>⚙️ Settings</summary>
      <input id="cfgKey" type="password" placeholder="API Key">
      <input id="cfgModel" value="deepseek-chat" placeholder="Model">
    </details>
  </div>
</div>

<div class="main">
  <div class="main-header"><h2>Rendered UI</h2><span class="status" id="status"></span></div>
  <div class="main-body" id="render"></div>
</div>

<script type="module">
// ============================================
//  OFFICIAL A2UI SDK v0.9 - STANDARD PROTOCOL
// ============================================
import { Data } from '@a2ui/lit/0.8';
import '@a2ui/lit/ui';

window.generate = async function() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  document.getElementById('status').textContent = '⏳ Generating...';
  
  try {
    const resp = await fetch('/a2ui/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await resp.json();
    
    if (data.error) {
      document.getElementById('render').innerHTML = '<p style="color:#ef4444">' + data.error + '</p>';
      return;
    }

    const ui = data.ui;
    document.getElementById('jsonView').textContent = JSON.stringify(ui, null, 2);

    // Standard A2UI protocol: create processor, process messages
    const processor = Data.createSignalA2uiMessageProcessor();
    
    // Ensure surfaceId
    if (!ui.surfaceUpdate.surfaceId) ui.surfaceUpdate.surfaceId = 'main';
    
    processor.processMessages([
      ui,
      { beginRendering: { surfaceId: ui.surfaceUpdate.surfaceId, root: 'root' } }
    ]);

    // Render with official component
    const render = document.getElementById('render');
    render.innerHTML = '';
    const surface = document.createElement('a2ui-surface');
    surface.setAttribute('surfaceId', ui.surfaceUpdate.surfaceId);
    surface.processor = processor;
    surface.surface = processor.getSurfaces().get(ui.surfaceUpdate.surfaceId);
    render.appendChild(surface);

    document.getElementById('status').textContent = '✅ Generated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('render').innerHTML = '<p style="color:#ef4444">' + e.message + '</p>';
    document.getElementById('status').textContent = '❌ Error';
  }
};
</script>
</body></html>
