<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A2UI Demo</title>
<style>
  body { font-family: system-ui; max-width: 700px; margin: 2rem auto; background: #111; color: #eee; }
  pre { background: #1a1a2e; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; border: 1px solid #333; }
  .render { background: #16213e; padding: 1.5rem; border-radius: 12px; margin: 1rem 0; border: 1px solid #00d4aa; }
  .render label { display: block; margin: 0.5rem 0; }
  .render input, .render select, .render button { padding: 0.5rem; border-radius: 8px; border: 1px solid #555; background: #222; color: #eee; }
  button { background: #0f3460; cursor: pointer; padding: 0.5rem 1.5rem; border: none; border-radius: 8px; color: #eee; }
  .info { font-size: 0.8rem; color: #888; }
  .success { color: #00d4aa; font-weight: bold; }
</style>
</head>
<body>
<h1>A2UI Protocol Demo</h1>
<p class="info">@a2ui/web_core v0.10.4 — Google's Agent-to-User Interface Protocol</p>

<h3>1. A2UI JSON Surface Definition</h3>
<pre id="jsonDef"></pre>

<h3>2. Rendered Output</h3>
<div class="render" id="renderTarget"></div>

<script type="module">
import { A2UISurface } from './node_modules/@a2ui/web_core/dist/index.js';

// A2UI surface — declarative UI generated by an AI agent
const a2uiSurface = {
  version: "0.8",
  surfaceUpdate: {
    components: [
      {
        id: "form",
        component: {
          Column: {
            children: { explicitList: ["title", "nameField", "emailField", "roleField", "submitBtn", "result"] }
          }
        }
      },
      {
        id: "title",
        component: {
          Text: { text: { literalString: "📋 User Registration" }, usageHint: "h2" }
        }
      },
      {
        id: "nameField",
        component: {
          TextField: { label: { literalString: "Name" }, text: { path: "/formData/name" }, usageHint: "shortText" }
        }
      },
      {
        id: "emailField",
        component: {
          TextField: { label: { literalString: "Email" }, text: { path: "/formData/email" }, usageHint: "shortText" }
        }
      },
      {
        id: "roleField",
        component: {
          MultipleChoice: {
            label: { literalString: "Role" },
            selections: { path: "/formData/role" },
            options: [
              { label: { literalString: "Developer" }, value: { literalString: "dev" } },
              { label: { literalString: "Designer" }, value: { literalString: "design" } },
              { label: { literalString: "Manager" }, value: { literalString: "manager" } }
            ]
          }
        }
      },
      {
        id: "submitBtn",
        component: {
          Button: { child: "btnLabel", action: { name: "submit" } }
        }
      },
      {
        id: "btnLabel",
        component: { Text: { text: { literalString: "✅ Submit" } } }
      },
      {
        id: "result",
        component: {
          Text: { text: { path: "/formData/result" }, usageHint: "body" }
        }
      }
    ]
  }
};

// Show the JSON
document.getElementById('jsonDef').textContent = JSON.stringify(a2uiSurface, null, 2);

// Render using A2UI web_core
const target = document.getElementById('renderTarget');
const surface = new A2UISurface(target, a2uiSurface.surfaceUpdate);

// Listen for submit action
surface.onAction('submit', () => {
  const data = surface.getData('/formData');
  surface.setData('/formData/result', `✅ Submitted: ${data.name} (${data.email}) — Role: ${data.role || 'none'}`);
});

// Init data
surface.setData('/formData', { name: '', email: '', role: '', result: '' });

document.getElementById('renderTarget').innerHTML += '<p class="success">✅ A2UI Surface rendered successfully!</p>';
</script>
</body>
</html>
