<!DOCTYPE html><html><head><meta charset="UTF-8"><title>A2UI</title>
<style>
body{background:#0d1117;color:#c9d1d9;font-family:system-ui;display:flex;height:100vh;margin:0}
.l{width:360px;padding:1rem;border-right:1px solid #30363d}
.r{flex:1;padding:1rem;overflow-y:auto}
h2{color:#58a6ff;margin:0 0 .5rem}
textarea{width:100%;height:60px;background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:.5rem;resize:vertical}
button{padding:.5rem 1rem;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:.5rem}
label{display:block;margin:.4rem 0 .1rem;font-size:.8rem;color:#8b949e}
input,select{width:100%;padding:.4rem;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;margin-bottom:.3rem}
pre{background:#0d1117;border-radius:6px;padding:.5rem;font-size:.7rem;max-height:200px;overflow:auto}
</style></head><body>
<div class="l">
<h2>A2UI</h2>
<textarea id="t">一个用户注册表单，包含姓名、邮箱、手机号</textarea>
<button id="b">Generate</button>
<details style="margin-top:.5rem"><summary style="color:#8b949e;cursor:pointer">JSON</summary><pre id="j"></pre></details>
</div>
<div class="r" id="o"><p style="color:#8b949e">Click Generate</p></div>
<script>
var D={};
function V(v){if(!v)return'';if(v.literalString)return v.literalString;if(v.path)return D[v.path.replace(/\//g,'')]||'';return''}
function R(id,byId){var c=byId[id];if(!c)return'';for(var[t,p]of Object.entries(c)){switch(t){
case'Text':return'<'+ (p.usageHint||'span') +'>'+V(p.text)+'</'+ (p.usageHint||'span') +'>';
case'TextField':var k=(p.text?.path||'').replace(/\//g,'');return'<label>'+V(p.label)+'</label><input oninput="D.'+k+'=this.value">';
case'Button':return'<button onclick="S()">'+(p.child?R(p.child,byId):'Submit')+'</button>';
case'Column':return'<div style="display:flex;flex-direction:column;gap:8px">'+ (p.children?.explicitList||[]).map(function(x){return R(x,byId)}).join('') +'</div>';
case'Row':return'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+ (p.children?.explicitList||[]).map(function(x){return R(x,byId)}).join('') +'</div>';
case'Card':return'<div style="background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:.75rem;margin:.5rem 0">'+ (p.children?.explicitList||[]).map(function(x){return R(x,byId)}).join('') +'</div>';
case'MultipleChoice':var k=(p.selections?.path||'').replace(/\//g,'');return'<label>'+V(p.label)+'</label><select onchange="D.'+k+'=this.value">'+(p.options||[]).map(function(o){return'<option value="'+V(o.value)+'">'+V(o.label)+'</option>'}).join('')+'</select>';
case'Table':var h='<table style="width:100%;border-collapse:collapse;margin:.5rem 0"><thead><tr style="background:#1f6feb">'+(p.columns||[]).map(function(c){return'<th style="padding:.4rem;text-align:left">'+V(c)+'</th>'}).join('')+'</tr></thead><tbody>';for(var i=0;i<(p.rows||[]).length;i++)h+='<tr style="border-bottom:1px solid #30363d">'+p.rows[i].map(function(c){return'<td style="padding:.4rem">'+V(c)+'</td>'}).join('')+'</tr>';return h+'</tbody></table>';
case'Modal':var mid='m'+Math.random().toString(36).slice(2,6);return'<button onclick="document.getElementById(\''+mid+'\').showModal()">'+(V(p.triggerText)||'Open')+'</button><dialog id="'+mid+'" style="background:#161b22;color:#c9d1d9;border:1px solid #58a6ff;border-radius:12px;padding:1.5rem"><h3>'+V(p.title)+'</h3>'+ (p.content? (p.content.explicitList||[]).map(function(x){return R(x,byId)}).join('') :'') +'<br><button onclick="document.getElementById(\''+mid+'\').close()" style="margin-top:1rem">Close</button></dialog>';
case'Chart':return'<div style="margin:1rem 0;text-align:center;padding:1rem;background:#0d1117;border-radius:8px"><strong>'+V(p.title)+'</strong><p style="font-size:.8rem;color:#8b949e">'+(p.labels||[]).join(',')+' | '+(p.datasets||[]).map(function(d){return d.label+':['+d.data+']'}).join('; ')+'</p></div>';
case'Tabs':var tid='t'+Math.random().toString(36).slice(2,6);return'<div style="display:flex;gap:4px;margin:.5rem 0">'+ (p.tabs||[]).map(function(tab,i){return'<button style="background:#0f3460;padding:.25rem .75rem;border-radius:4px;border:none;color:#eee;cursor:pointer" onclick="var ds=document.querySelectorAll(\\'[data-tab='+tid+']\\');for(var j=0;j<ds.length;j++)ds[j].style.display=j==='+i+'?\\'block\\':\\'none\\'">'+V(tab)+'</button>'}).join('') +'</div><div>'+ (p.contents||[]).map(function(c,i){return'<div data-tab="'+tid+'" style="display:'+(i===0?'block':'none')+'">'+ (c.explicitList||[]).map(function(x){return R(x,byId)}).join('') +'</div>'}).join('') +'</div>';
default:return'';
}}return''}
function S(){var v=[];for(var k in D)if(D[k])v.push(k+':'+D[k]);document.getElementById('o').innerHTML+='<p style="color:#3fb950">OK: '+v.join(', ')+'</p>'}

document.getElementById('b').onclick=function(){
 var p=document.getElementById('t').value.trim();if(!p)return;
 var x=new XMLHttpRequest();
 x.open('POST','/a2ui/generate');
 x.setRequestHeader('Content-Type','application/json');
 x.onload=function(){
  if(x.status!==200)return;
  var d=JSON.parse(x.responseText);
  if(d.error){document.getElementById('o').innerHTML='<p style="color:#f85149">'+d.error+'</p>';return}
  var ui=d.ui;
  document.getElementById('j').textContent=JSON.stringify(ui,null,2);
  var comps=ui.surfaceUpdate.components;
  var byId={};for(var i=0;i<comps.length;i++)byId[comps[i].id]=comps[i].component;
  D={};
  document.getElementById('o').innerHTML=R('root',byId);
 };
 x.send(JSON.stringify({prompt:p}));
};
</script>
</body></html>
