<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>AG-UI × DeepSeek</title>
<style>
*{box-sizing:border-box}body{font-family:system-ui;background:#0d1117;color:#c9d1d9;margin:0;height:100vh;display:flex}
.l{width:420px;padding:1rem;border-right:1px solid #30363d;display:flex;flex-direction:column}
.r{flex:1;padding:1rem;overflow-y:auto}
h2{color:#58a6ff;font-size:1rem;margin:0 0 .5rem}
textarea{width:100%;height:80px;background:#161b22;color:#eee;border:1px solid #30363d;border-radius:6px;padding:.5rem;resize:vertical}
button{padding:.4rem 1rem;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:.5rem}
button:hover{background:#2ea043}
.msg{padding:.4rem .6rem;margin:.15rem 0;border-radius:6px;font-size:.85rem;line-height:1.5}
.user{background:#1f6feb22;border:1px solid #1f6feb44;text-align:right}
.agent{background:#23863622;border:1px solid #23863644}
.event{font-family:monospace;font-size:.7rem;color:#d2a8ff;padding:.1rem .4rem;border-radius:4px;margin:.1rem 0;background:#2a1a3e33}
.events pre{font-size:.65rem;color:#8b949e;max-height:200px;overflow:auto;background:#0d1117;padding:.5rem;border-radius:6px}
</style></head><body>
<div class="l">
<h2>AG-UI Stream</h2>
<textarea id="p">解释一下 Kubernetes 的核心概念</textarea>
<button onclick="send()">Send</button>
<div style="margin-top:1rem"><strong style="font-size:.8rem;color:#58a6ff">AG-UI Events</strong></div>
<div class="events"><pre id="evt"></pre></div>
</div>
<div class="r" id="chat">
<div class="event">Ask anything — DeepSeek streams via AG-UI events</div>
</div>
<script>
var events = [];

async function send() {
  var p = document.getElementById('p').value.trim();
  if (!p) return;
  events = [];
  document.getElementById('evt').textContent = '';
  add('user', p);
  
  var r = await fetch('/agui/stream', {
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:p})
  });
  
  var reader = r.body.getReader();
  var dec = new TextDecoder();
  var buf = '', full = '', msgDiv = null;
  
  while (true) {
    var {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    var lines = buf.split('\n');
    buf = lines.pop() || '';
    for (var i=0;i<lines.length;i++) {
      if (!lines[i].startsWith('data: ')) continue;
      try {
        var ev = JSON.parse(lines[i].slice(6));
        events.push(ev);
        document.getElementById('evt').textContent = events.map(e=>JSON.stringify(e)).join('\n');
        
        if (ev.type === 'TEXT_MESSAGE_CONTENT') {
          if (!msgDiv) { msgDiv = add('agent', ''); }
          full += ev.delta;
          msgDiv.textContent = full;
        } else if (ev.type !== 'RUN_STARTED' && ev.type !== 'TEXT_MESSAGE_END') {
          add('event', JSON.stringify(ev));
        }
      } catch(e) {}
    }
  }
}

function add(cls, text) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = 99999;
  return d;
}
</script>
</body></html>
